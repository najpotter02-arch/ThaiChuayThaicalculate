<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="top-nav">
    <a href="index.html">← Home</a>
  </div>


  <div class="container login-box">

    <h1>สร้างบัญชีผู้ใช้</h1>

    <p>
      สมัครสมาชิกเพื่อใช้งานระบบ
    </p>


    <form id="registerForm">


      <input
        id="name"
        type="text"
        placeholder="ชื่อ"
        required
      />


      <input
        id="email"
        type="email"
        placeholder="Email"
        required
      />


      <input
        id="password"
        type="password"
        placeholder="Password"
        required
      />


      <button type="submit">
        สมัครสมาชิก
      </button>


    </form>


    <p class="small-text">
      มีบัญชีอยู่แล้ว?
      <a href="login.html">
        เข้าสู่ระบบ
      </a>
    </p>


  </div>


  <script type="module" src="./js/register.js"></script>

</body>
</html>
