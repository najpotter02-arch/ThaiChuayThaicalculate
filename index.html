<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ไทยช่วยไทย 60:40</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>🇹🇭ไทยช่วยไทย 60:40</h1>
      <p>กรอกราคาสินค้าเพื่อคำนวณจำนวนเงินที่ต้องจ่าย</p>

      <form onsubmit="calculate(event)">
        <input
          type="number"
          id="price"
          placeholder="เช่น 100"
          min="1"
          step="0.01"
          required
        />

        <button type="submit">คำนวณ</button>
      </form>

      <div id="result"></div>
    </div>

    <script>
      function calculate(event) {
        event.preventDefault();

        const price = Number(document.getElementById("price").value);
        const result = document.getElementById("result");

        if (price <= 0 || isNaN(price)) {
          result.innerHTML = `
            <div class="card error">
              <p>⚠️ กรุณากรอกราคาสินค้าให้ถูกต้อง</p>
            </div>
          `;
          return;
        }

        const government = (price * 0.6).toFixed(2);
        const user = (price * 0.4).toFixed(2);

        result.innerHTML = `
          <div class="card">
            <h3>ผลการคำนวณ</h3>

            <p>💰 ราคาสินค้า <strong>${price.toFixed(2)}</strong> บาท</p>

            <p>🏛️ รัฐช่วยจ่าย <strong>${government}</strong> บาท</p>

            <p>🙋 คุณจ่าย <strong>${user}</strong> บาท</p>
          </div>
        `;
      }
    </script>
  </body>
</html>
